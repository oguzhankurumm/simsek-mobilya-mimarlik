name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint-unit:
    name: Typecheck + Lint + Unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Unit tests
        run: npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      AUTH_SECRET: ci_test_secret_not_for_production
      AI_GATEWAY_API_KEY: ci_test_key
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply DB schema
        run: npx drizzle-kit push --dialect=postgresql --schema=src/lib/db/schema.ts --url=$DATABASE_URL --force
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
      - name: Run Playwright
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  size-limit:
    name: Bundle size budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      AUTH_SECRET: ci_test_secret_not_for_production
      AI_GATEWAY_API_KEY: ci_test_key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run size

  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [typecheck-lint-unit]
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      AUTH_SECRET: ci_test_secret_not_for_production
      AI_GATEWAY_API_KEY: ci_test_key
      LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply DB schema
        run: npx drizzle-kit push --dialect=postgresql --schema=src/lib/db/schema.ts --url=$DATABASE_URL --force
      - run: npm run build
      - name: Run Lighthouse CI
        run: npm run lhci
        continue-on-error: true
